on:
  push:
    branches:
      - main

name: release-please

jobs:
  release-please:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          release-type: node
          include-component-in-tag: true
        # The logic below handles the npm publication:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # these if statements ensure that a publication only occurs when
        # a new release is created:
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
        if: ${{ steps.release.outputs.release_created }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: ${{ steps.release.outputs.release_created }}
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen
        if: ${{ steps.release.outputs.release_created }}
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-bindgen/releases/download/0.2.114/wasm-bindgen-0.2.114-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp
          echo "/tmp/wasm-bindgen-0.2.114-x86_64-unknown-linux-musl" >> $GITHUB_PATH
      - run: npm run build:release
        if: ${{ steps.release.outputs.release_created }}
      - run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_AUTH_TOKEN: ""
